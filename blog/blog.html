<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      const theme = localStorage.getItem("theme");
      if (theme === "light") {
        document.documentElement.classList.add("light-theme");
      }
    </script>
    <title>Haru | Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
    />
    <link rel="stylesheet" href="../style.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap");
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <script src="../js/blog-config.js" defer></script>
    <script src="../js/github.js" defer></script>
    <script src="../js/theme.js" defer></script>

    <script src="../js/nav.js" defer></script>
    <link rel="icon" type="image/png" href="../res/icon.png" />
  </head>
  <body>
    <section id="blog" class="section">
      <a href="../index.html" class="back-home" style="margin-bottom: 2rem">
        <i class="fas fa-arrow-left"></i> Back to Portfolio
      </a>
      <h2 class="section-title">Blog</h2>
      <div id="blog-grid"></div>
    </section>
    <footer class="footer">
      <p>&copy; 2024 Aron Jake S. Radam. All rights reserved.</p>
    </footer>
    <script>
      fetch("../partials/navbar.html")
        .then((res) => res.text())
        .then((html) => {
          document.body.insertAdjacentHTML("afterbegin", html);
        });
    </script>
  </body>
</html>
