<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      const theme = localStorage.getItem("theme");
      if (theme === "light") {
        document.documentElement.classList.add("light-theme");
      }
    </script>
    <title>Haru | Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../js/theme.js" defer></script>
  </head>
  <body>
    <div id="progress-container"><div id="progress-bar"></div></div>

    <nav class="nav">
      <div class="nav-container">
        <a href="../index.html" class="nav-logo">Haru</a>
        <ul class="nav-links">
          <li><a href="../index.html#background" class="nav-link">About</a></li>
          <li>
            <a href="../index.html#projects" class="nav-link">Projects</a>
          </li>
          <li><a href="../index.html#skills" class="nav-link">Skills</a></li>
          <li><a href="../index.html#contact" class="nav-link">Contact</a></li>
          <li><a href="./index.html" class="nav-link active">Blog</a></li>
        </ul>
        <div class="nav-actions">
          <button id="theme-toggle" class="theme-toggle">
            <i class="fas fa-sun"></i>
          </button>
          <button id="burger-menu-toggle" class="burger-menu">
            <i class="fas fa-ellipsis-vertical"></i>
          </button>
        </div>
      </div>
    </nav>

    <main class="blog-post-container">
      <a href="./blog.html" class="back-home">
        <i class="fas fa-arrow-left"></i> Back to Blog
      </a>
      <div id="post-content">
        <p style="color: var(--text-muted)">Loading post...</p>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2024 Aron Jake S. Radam. All rights reserved.</p>
    </footer>

    <script src="../js/nav.js" defer></script>
    <script src="../js/reader.js" defer></script>
  </body>
</html>
